<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chatbox Normativo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 800px;
      height: 80vh;
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px;
      background-color: #1d4ed8;
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background-color: #f9fafb;
    }

    .mensaje {
      margin-bottom: 15px;
      line-height: 1.4;
    }

    .usuario {
      font-weight: bold;
      color: #1e3a8a;
    }

    .bot {
      color: #374151;
      font-style: italic;
    }

    .chat-input {
      padding: 20px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #e5e7eb;
      background-color: #ffffff;
    }

    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
    }

    .chat-input button {
      padding: 12px 24px;
      background-color: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.2s ease;
    }

    .chat-input button:hover {
      background-color: #1e40af;
    }

    @media (max-width: 600px) {
      .chat-container {
        height: 90vh;
        border-radius: 0;
      }

      .chat-input {
        flex-direction: column;
      }

      .chat-input button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">🤖 Chatbox Regulatorio</div>
    <div class="chat-messages" id="mensajes"></div>
    <div class="chat-input">
      <input type="text" id="pregunta" placeholder="Haz una pregunta sobre los reportes..." />
      <button onclick="enviarPregunta()">Preguntar</button>
    </div>
  </div>

  <script>
    function enviarPregunta() {
      const pregunta = document.getElementById('pregunta').value;
      const mensajes = document.getElementById('mensajes');
      if (!pregunta.trim()) return;

      mensajes.innerHTML += `<div class="mensaje usuario">👤 Tú: ${pregunta}</div>`;
      document.getElementById('pregunta').value = '';

      fetch('/chatbox/preguntar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pregunta })
      })
      .then(res => res.json())
      .then(data => {
        mensajes.innerHTML += `<div class="mensaje bot">🤖 Bot: ${data.respuesta}</div>`;
        mensajes.scrollTop = mensajes.scrollHeight;
      });
    }

    // Enter para enviar
    document.getElementById("pregunta").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        enviarPregunta();
      }
    });
  </script>
</body>
</html>
